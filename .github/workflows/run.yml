name: Bill Reader

on:
  # Manual run: enter the main Drive folder id (contains the spreadsheet + subfolders).
  workflow_dispatch:
    inputs:
      folder_id:
        description: "Main Drive folder ID (contains the spreadsheet + the subfolders)"
        required: true
        type: string

  # Scheduled runs are disabled for now — uncomment to re-enable.
  # schedule:
  #   - cron: "0 6 * * *" # daily 06:00 UTC

# Avoid overlapping runs writing to the same sheet.
concurrency:
  group: billreader
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run bill reader
        env:
          GOOGLE__AI__API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_MODEL: gemini-3.5-flash
          MANUAL_FOLDER_ID: ${{ inputs.folder_id }}
        run: python -m billreader.main
